name: Company metrics crawler

# Manual-only. Reads public/data/liquid-universe.json (the volume-pass names),
# crawls each company's Screener page, and commits the extracted fundamentals +
# series to public/data/daksham-companies.json. Runs ONLY on the liquid set.
#
# A full ~947-company run takes a couple of hours; smoke-test with max_companies
# first, then run the rest (optionally in batches via start_at + max_companies).
on:
  workflow_dispatch:
    inputs:
      start_at:
        description: "Resume offset (index into liquid-universe.json)."
        required: false
        default: "0"
      max_companies:
        description: "Max companies to crawl this run (blank = all). Set 3-5 for a smoke test."
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: company-metrics
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium

      - name: Crawl company metrics
        env:
          SCREENER_EMAIL: ${{ secrets.SCREENER_EMAIL }}
          SCREENER_PASSWORD: ${{ secrets.SCREENER_PASSWORD }}
          START_AT: ${{ inputs.start_at }}
          MAX_COMPANIES: ${{ inputs.max_companies }}
        run: node scrapers/company-metrics.mjs

      - name: Upload companies artifact
        uses: actions/upload-artifact@v4
        with:
          name: daksham-companies
          if-no-files-found: error
          path: |
            public/data/daksham-companies.json
            public/data/daksham-companies.csv
            public/data/companies-metadata.json

      - name: Commit company metrics to public/data/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/daksham-companies.json public/data/daksham-companies.csv public/data/companies-metadata.json
          if git diff --cached --quiet; then
            echo "No changes to company metrics; nothing to commit."
          else
            git commit -m "data: refresh company metrics [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
